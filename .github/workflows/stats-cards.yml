name: Update README cards

on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  list-repos:
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.list.outputs.repos }}

    steps:
      - name: List non-fork repositories
        id: list
        env:
          OWNER: ${{ github.repository_owner }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          repos=$(
            gh api \
              -H "Accept: application/vnd.github+json" \
              "/users/${OWNER}/repos?per_page=100&type=owner&sort=updated" \
              --paginate \
              --jq '[.[] | select(.fork == false) | {repo: .name}]'
          )

          echo "Repositories:"
          echo "$repos" | jq .

          echo "repos=${repos}" >> "$GITHUB_OUTPUT"

  generate-repo-cards:
    needs: list-repos
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.list-repos.outputs.repos) }}

    steps:
      - uses: actions/checkout@v4

      - name: Prepare directory
        run: |
          mkdir -p profile/repos

      - name: Generate pin card for ${{ matrix.repo }}
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=${{ matrix.repo }}
          path: profile/repos/${{ matrix.repo }}.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check generated file
        run: |
          echo "Generated files:"
          find profile -type f -name "*.svg" -print

      - name: Upload repo card
        uses: actions/upload-artifact@v4
        with:
          name: repo-card-${{ matrix.repo }}
          path: profile/repos/${{ matrix.repo }}.svg
          if-no-files-found: error

  generate-summary-cards:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Prepare directory
        run: |
          mkdir -p profile

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=6
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload summary cards
        uses: actions/upload-artifact@v4
        with:
          name: summary-cards
          path: |
            profile/stats.svg
            profile/top-langs.svg
          if-no-files-found: error

  commit-cards:
    needs:
      - generate-repo-cards
      - generate-summary-cards
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Clean old cards
        run: |
          mkdir -p profile/repos
          rm -f profile/repos/*.svg

      - name: Download generated cards
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Debug downloaded artifacts
        run: |
          echo "Downloaded artifacts:"
          find artifacts -type f -print

      - name: Move cards into profile directory
        run: |
          mkdir -p profile/repos

          find artifacts -name "stats.svg" -exec cp {} profile/stats.svg \;
          find artifacts -name "top-langs.svg" -exec cp {} profile/top-langs.svg \;
          find artifacts -path "*/profile/repos/*.svg" -exec cp {} profile/repos/ \;

          echo "Final profile files:"
          find profile -type f -name "*.svg" -print

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

          git add profile
          git commit -m "Update README cards" || exit 0
          git push
