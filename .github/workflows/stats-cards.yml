name: Update README cards

on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.list.outputs.repos }}
    steps:
      - name: List non-fork repositories
        id: list
        env:
          OWNER: ${{ github.repository_owner }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          repos=$(
            gh api \
              -H "Accept: application/vnd.github+json" \
              "/users/${OWNER}/repos?per_page=100&type=owner&sort=updated" \
              --paginate \
              --jq '[.[] | select(.fork == false) | .name]'
          )

          echo "repos=${repos}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Clean old cards
        run: |
          mkdir -p profile/repos
          rm -f profile/repos/*.svg

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=6
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate repo cards
        env:
          OWNER: ${{ github.repository_owner }}
          REPOS: ${{ needs.prepare.outputs.repos }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$REPOS" | jq -r '.[]' > repos.txt

          while read repo; do
            echo "repo=${repo}" >> "$GITHUB_ENV"
            echo "Generating card for ${repo}"
          done < repos.txt
